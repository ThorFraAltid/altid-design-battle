<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Altid Hjem · Design Battle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FCFAF4; --paper:#F5EFE3; --forest:#193D23; --forest2:#163223;
    --lime:#90FF7C; --muted:#7B7569; --line:#E6E2D8; --win:#3E8E54; --slack:#4A154B;
  }
  *{box-sizing:border-box;font-weight:400}
  html,body{margin:0;height:100%}
  body{background:var(--cream);color:var(--forest);font-family:'Onest',-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  header{display:flex;align-items:center;gap:16px;padding:13px 22px;position:sticky;top:0;background:#163223;z-index:5}
  .logo svg{height:30px;width:auto;display:block}
  .meta{margin-left:auto;display:flex;align-items:center;gap:18px;font-size:14px;color:#AEBBAB}
  .round{color:#fff}
  .bar{width:200px;height:8px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--lime);width:0;transition:width .4s ease}
  button{font-family:inherit;cursor:pointer;border:0}
  #restart{background:var(--lime);color:#163223;padding:9px 16px;border-radius:10px;font-size:13px}
  #restart:hover{filter:brightness(.95)}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--forest);padding:9px 15px;border-radius:10px;font-size:13px}
  .ghost:hover{background:var(--paper)}

  /* upload */
  #upload{min-height:calc(100vh - 56px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  #upload h1{font-size:58px;line-height:1.05;margin:0 0 22px;letter-spacing:-2px;color:var(--forest)}
  .lead{max-width:600px;margin:0 0 30px;line-height:1.6;font-size:20px;color:var(--muted)}
  .lead b{color:var(--forest)}
  .drop{width:min(620px,92vw);border:2px dashed #C9C2B2;border-radius:20px;background:#fff;padding:42px 24px;transition:.2s}
  .drop.drag{border-color:var(--win);background:#F4FBF2}
  .drop .big{font-size:18px;margin-bottom:6px}
  .drop .sub{color:var(--muted);font-size:14px;margin-bottom:20px}
  .cta{background:var(--forest);color:#fff;padding:14px 24px;border-radius:13px;font-size:15px}
  .cta:hover{background:var(--forest2)}
  #status{margin-top:18px;color:var(--muted);font-size:14px;min-height:20px}

  /* arena */
  #arena{display:none;padding:18px clamp(12px,3vw,40px) 40px}
  .arena-wrap{display:grid;grid-template-columns:1fr 64px 1fr;align-items:stretch;max-width:1500px;margin:0 auto}
  .panel{display:flex;flex-direction:column;border:1px solid var(--line);background:#fff;overflow:hidden;transition:transform .12s ease, box-shadow .12s ease}
  .panel:hover{box-shadow:0 10px 34px rgba(25,61,35,.14);transform:translateY(-2px)}
  .imgwrap{flex:1;max-height:78vh;overflow:auto;background:var(--paper)}
  .imgwrap img{width:100%;height:auto;display:block}
  .plabel{padding:10px 14px;font-size:13px;color:var(--muted);border-top:1px solid var(--line)}
  .pick{background:var(--lime);color:#163223;font-size:16px;padding:15px;text-align:center}
  .pick:hover{filter:brightness(.93)}
  .panel:hover .pick{filter:brightness(.93)}
  .vs{display:flex;align-items:center;justify-content:center}
  .vs span{display:flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;background:var(--forest);color:var(--lime);font-size:15px}

  /* winner */
  #winner{display:none;min-height:calc(100vh - 56px);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  #winner .trophy{font-size:52px}
  #winner h1{font-size:38px;margin:6px 0 14px;letter-spacing:-1px}
  .namerow{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:18px}
  .namerow label{font-size:13px;color:var(--muted)}
  #winName{font-family:inherit;font-size:20px;color:var(--forest);text-align:center;border:1px solid var(--line);border-radius:12px;padding:11px 16px;width:min(420px,86vw);background:#fff}
  #winName:focus{outline:none;border-color:var(--win)}
  .winshot{width:min(540px,92vw);max-height:58vh;overflow:auto;border:3px solid var(--win);background:#fff}
  .winshot img{width:100%;display:block}
  .winactions{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;justify-content:center}
  .slack{background:var(--slack);color:#fff;padding:14px 24px;border-radius:13px;font-size:15px}
  .slack:hover{background:#611f64}
  .sharemsg{margin-top:16px;color:var(--muted);font-size:14px;min-height:20px;max-width:560px}
  .sharemsg a{color:var(--win)}

  @media (max-width:820px){
    .arena-wrap{grid-template-columns:1fr;gap:14px}
    .vs{order:-1;margin:0 0 6px}.vs span{width:44px;height:44px}
    .imgwrap{max-height:46vh}
    #upload h1{font-size:42px}
  }
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 94 55" xmlns="http://www.w3.org/2000/svg" aria-label="Altid Hjem">
      <path d="M18.5781 31.3242V28.7838H18.4945C17.488 30.8579 14.7203 32.1281 11.659 32.1281C4.78067 32.1291 0 26.6676 0 19.5561C0 12.4446 4.99073 7.02637 11.659 7.02637C14.5102 7.02637 17.1525 8.16891 18.4945 10.3284H18.5781V7.83127H25.54V31.3242H18.5781ZM18.5781 19.5561C18.5781 16.2541 15.9359 13.5882 12.6645 13.5882C9.39308 13.5882 6.96094 16.2551 6.96094 19.6415C6.96094 23.0279 9.51952 25.5683 12.7481 25.5683C15.9767 25.5683 18.5771 22.9435 18.5771 19.5571L18.5781 19.5561Z" fill="white"/>
      <path d="M30.8223 31.3239V0H37.7842V31.3239H30.8223Z" fill="white"/>
      <path d="M44.2004 31.3239V13.1648H40.7617V7.83096H44.2004V0H51.1623V7.83096H54.5173V13.1648H51.1623V31.3239H44.2004Z" fill="white"/>
      <path d="M57.5371 5.33386V0H64.499V5.33386H57.5371ZM57.5371 31.3239V7.83096H64.499V31.3239H57.5371Z" fill="white"/>

      <path d="M62.5784 50.7978V45.9373C62.5784 44.016 61.8427 43.1437 60.3702 43.1437C58.8978 43.1437 58.0347 44.2099 58.0347 45.9533V50.7978H56.3711V38.8479H58.0347V42.8041H58.0665C58.5942 42.0122 59.4424 41.6093 60.5465 41.6093C62.658 41.6093 64.242 42.9659 64.242 45.4208V50.7978H62.5784Z" fill="#A8E163"/>
      <path d="M65.4414 52.5581C66.0975 52.4938 66.5455 52.2998 66.5455 50.9272V41.8522H68.2091V51.3794C68.2091 53.3178 66.5296 54.3186 65.4414 54.3186V52.5591V52.5581ZM66.5455 40.8182V38.8486H68.2091V40.8182H66.5455Z" fill="#A8E163"/>
      <path d="M71.5376 47.051C71.9219 48.5372 73.0897 49.4898 74.4496 49.4898C75.489 49.4898 76.4656 48.9412 76.9773 47.9885H78.6409C77.953 49.8295 76.2894 51.0243 74.3849 51.0243C71.8891 51.0243 69.873 48.7955 69.873 46.4059C69.873 43.5802 71.9846 41.6096 74.3371 41.6096C76.9445 41.6096 78.9286 43.6445 78.9286 46.2119C78.9286 46.4863 78.9286 46.7445 78.8809 47.052H71.5376V47.051ZM77.2651 45.7587C77.1376 44.2404 75.8096 43.1431 74.3849 43.1431C72.9603 43.1431 71.6651 44.2253 71.5376 45.7587H77.2651Z" fill="#A8E163"/>
      <path d="M92.3344 50.7972V45.7909C92.3344 44.0947 91.6305 43.1421 90.2387 43.1421C88.7673 43.1421 88.1272 43.9661 88.1272 45.7578V50.7962H86.4636V45.597C86.4636 43.8365 85.6472 43.1421 84.4476 43.1421C82.9762 43.1421 82.2554 44.0143 82.2554 45.7739V50.7962H80.5918V41.8498H82.1279V42.8185H82.1598C82.8796 41.9624 83.5516 41.6077 84.7034 41.6077C85.8553 41.6077 87.0072 42.1734 87.4552 43.1089C88.0953 42.092 88.9754 41.6077 90.3831 41.6077C92.6868 41.6077 93.999 43.0607 93.999 45.3699V50.7952H92.3354L92.3344 50.7972Z" fill="#A8E163"/>
    </svg>
  </div>
  <div class="meta" id="hud" style="visibility:hidden">
    <div class="round" id="roundName">—</div>
    <div id="matchCount">—</div>
    <div class="bar"><i id="barFill"></i></div>
    <button id="restart">Start forfra</button>
  </div>
</header>

<section id="upload">
  <h1>Hvilket design vinder?</h1>
  <p class="lead"><b>Upload jeres designs som PDF</b> — så dyster de 1‑mod‑1. Du vælger vinderen hver gang, og taberen ryger ud, til der står ét design tilbage.</p>
  <div class="drop" id="drop">
    <div class="big">Træk din PDF herind</div>
    <div class="sub">eller vælg en fil — du kan også vælge flere billeder (PNG/JPG)</div>
    <button class="cta" id="browse">Vælg fil(er)</button>
    <input id="file" type="file" accept="application/pdf,image/*" multiple hidden />
  </div>
  <div id="status"></div>
</section>

<section id="arena">
  <div class="arena-wrap">
    <div class="panel" id="panelA">
      <div class="imgwrap"><img id="imgA" alt="Design A"/></div>
      <div class="plabel"><span id="nameA">Design</span></div>
      <button class="pick" data-side="0">Vælg denne ✓</button>
    </div>
    <div class="vs"><span>VS</span></div>
    <div class="panel" id="panelB">
      <div class="imgwrap"><img id="imgB" alt="Design B"/></div>
      <div class="plabel"><span id="nameB">Design</span></div>
      <button class="pick" data-side="1">Vælg denne ✓</button>
    </div>
  </div>
</section>

<section id="winner">
  <div class="trophy">🏆</div>
  <h1>Vi har en vinder</h1>
  <div class="namerow">
    <label for="winName">Vinderens navn (kan rettes)</label>
    <input id="winName" type="text" placeholder="Navn på vinderdesignet" />
  </div>
  <div class="winshot"><img id="winImg" alt="Vinder"/></div>
  <div class="winactions">
    <button class="slack" id="share">Del i Slack</button>
    <button class="ghost" id="slackcfg">⚙ Slack‑opsætning</button>
    <button class="ghost" id="again">Kør igen</button>
    <button class="ghost" id="newpdf">Upload ny PDF</button>
  </div>
  <div id="shareMsg" class="sharemsg"></div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  const $ = s => document.querySelector(s);
  if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; }

  let contestants=[];
  let current=[], next=[], idx=0, totalMatches=0, played=0;

  const upload=$("#upload"), arena=$("#arena"), winner=$("#winner"), hud=$("#hud"), status=$("#status");

  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  async function renderPdf(buf){
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const out=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const base=page.getViewport({scale:1});
      const scale=Math.min(2, 1100/base.width);
      const vp=page.getViewport({scale});
      const c=document.createElement("canvas"); c.width=vp.width; c.height=vp.height;
      const ctx=c.getContext("2d");
      await page.render({canvasContext:ctx,viewport:vp}).promise;
      const W=c.width, H=c.height, d=ctx.getImageData(0,0,W,H).data;
      const blank=y=>{ for(let xx=0;xx<W;xx+=9){const i=(y*W+xx)*4; if(d[i]<250||d[i+1]<250||d[i+2]<250) return false;} return true; };
      let last=H-1; while(last>H*0.25 && blank(last)) last--;
      const cropH=Math.min(H, last+24);
      let outC=c;
      if(cropH < H-4){ outC=document.createElement("canvas"); outC.width=W; outC.height=cropH; outC.getContext("2d").drawImage(c,0,0); }
      out.push({name:"Side "+p, src:outC.toDataURL("image/jpeg",0.85)});
    }
    return out;
  }
  function cleanName(fn){
    let n=(fn||"").replace(/\.[a-z0-9]+$/i,"");
    n=n.replace(/^\s*altid\s*mad\s*[-–—]\s*/i,"").trim();
    if(/^orgi?inial|^original/i.test(n)) n="Original (grøn)";
    return n||fn;
  }
  function loadImages(files){
    files=files.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"",'da'));
    return Promise.all(files.map((f,i)=>new Promise(res=>{
      const r=new FileReader();
      r.onload=()=>res({name:cleanName(f.name)||("Billede "+(i+1)), src:r.result}); r.readAsDataURL(f);
    })));
  }

  async function handleFiles(files){
    files=[...files];
    const pdfs=files.filter(f=>f.type==="application/pdf"||/\.pdf$/i.test(f.name)).sort((a,b)=>(a.name||"").localeCompare(b.name||"",'da'));
    const imgs=files.filter(f=>/^image\//.test(f.type));
    try{
      let list=[];
      if(pdfs.length){
        for(let k=0;k<pdfs.length;k++){
          status.textContent="Læser PDF "+(k+1)+" af "+pdfs.length+" …";
          const pages=await renderPdf(await pdfs[k].arrayBuffer());
          const nm=cleanName(pdfs[k].name);
          if(pages.length===1){ pages[0].name=nm; list.push(pages[0]); }
          else pages.forEach((pg,i)=>{ pg.name=nm+" · s."+(i+1); list.push(pg); });
        }
      } else if(imgs.length){ list=await loadImages(imgs); }
      contestants=list;
    }catch(e){ status.textContent="Kunne ikke læse filerne: "+e.message; return; }
    if(contestants.length<2){ status.textContent="Jeg fandt kun "+contestants.length+" design. Du skal bruge mindst 2."; return; }
    start();
  }

  async function loadSet(url, silent){
    try{
      status.textContent=silent?"":"Henter sæt …";
      const man=await (await fetch(url)).json();
      const baseU=man.base||"";
      const list=[];
      for(let i=0;i<man.items.length;i++){
        const it=man.items[i];
        status.textContent="Henter design "+(i+1)+" af "+man.items.length+" … ("+it.name+")";
        const resp=await fetch(baseU+encodeURIComponent(it.file));
        if(!resp.ok) throw new Error("kunne ikke hente "+it.file+" ("+resp.status+")");
        const pages=await renderPdf(await resp.arrayBuffer());
        pages[0].name=it.name||cleanName(it.file);
        list.push(pages[0]);
      }
      if(list.length<2){ status.textContent="Sættet skal have mindst 2 designs."; return; }
      contestants=list; start();
    }catch(e){ status.textContent = silent ? "" : "Kunne ikke hente sættet: "+e.message; }
  }

  function roundLabel(n){
    if(n<=2)return "Finale"; if(n<=4)return "Semifinale"; if(n<=8)return "Kvartfinale";
    if(n<=16)return "Ottendedelsfinale"; return "Runde";
  }

  function start(){
    current=shuffle(contestants.slice()); next=[]; idx=0; played=0;
    totalMatches=contestants.length-1;
    upload.style.display="none"; winner.style.display="none"; arena.style.display="block"; hud.style.visibility="visible";
    $("#shareMsg").textContent="";
    advance();
  }

  function advance(){
    while(true){
      if(idx<=current.length-2){ return showMatch(); }
      if(idx===current.length-1){ next.push(current[idx]); idx+=2; continue; }
      current=next; next=[]; idx=0;
      if(current.length===1) return showWinner(current[0]);
    }
  }

  function showMatch(){
    const a=current[idx], b=current[idx+1];
    $("#imgA").src=a.src; $("#imgB").src=b.src;
    $("#nameA").textContent=a.name; $("#nameB").textContent=b.name;
    $("#roundName").textContent=roundLabel(current.length);
    $("#matchCount").textContent="Kamp "+(played+1)+" af "+totalMatches;
    $("#barFill").style.width=(played/totalMatches*100)+"%";
    document.querySelectorAll(".imgwrap").forEach(w=>w.scrollTop=0);
  }

  function pick(side){
    next.push(side===0?current[idx]:current[idx+1]);
    played++; idx+=2;
    advance();
  }

  function showWinner(w){
    arena.style.display="none"; hud.style.visibility="hidden"; winner.style.display="flex";
    $("#winName").value=w.name;
    $("#winImg").src=w.src;
  }

  /* ---- Slack sharing ---- */
  function getHook(){ return (localStorage.getItem("slackWebhook")||"").trim(); }
  function setHook(){
    const v=prompt("Indsæt jeres Slack Incoming Webhook URL.\nGemmes kun lokalt i denne browser.\n(Lad feltet stå tomt for at slå auto‑post fra.)", getHook());
    if(v===null) return;
    localStorage.setItem("slackWebhook", v.trim());
    $("#shareMsg").textContent = v.trim() ? "Slack‑webhook gemt — “Del i Slack” sender nu direkte." : "Auto‑post slået fra.";
  }
  function msgFor(){
    const name=($("#winName").value||"").trim()||"(uden navn)";
    return "🏆 Vinderen af Altid Hjem Design Battle: *"+name+"*";
  }
  function share(){
    const hook=getHook();
    const msg=msgFor();
    if(hook){
      fetch(hook,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"payload="+encodeURIComponent(JSON.stringify({text:msg}))})
        .then(()=>{ $("#shareMsg").textContent="Sendt til Slack  —  "+msg.replace(/\*/g,""); })
        .catch(()=>{ copyFallback(msg); });
    } else { copyFallback(msg); }
  }
  function copyFallback(msg){
    const plain=msg.replace(/\*/g,"");
    if(navigator.clipboard) navigator.clipboard.writeText(plain).catch(()=>{});
    $("#shareMsg").innerHTML="Kopieret til udklipsholder — indsæt i Slack med ⌘V.<br><a href='#' id='sethook'>Vil du auto‑poste i stedet? Opsæt Slack‑webhook →</a>";
    const sh=$("#sethook"); if(sh) sh.onclick=e=>{e.preventDefault();setHook();};
    if(navigator.share) navigator.share({text:plain}).catch(()=>{});
  }

  /* ---- events ---- */
  $("#browse").onclick=()=>$("#file").click();
  $("#file").onchange=e=>handleFiles(e.target.files);
  const drop=$("#drop");
  ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("drag");}));
  drop.addEventListener("drop",e=>{ if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });
  document.querySelectorAll(".pick").forEach(b=>b.onclick=()=>pick(+b.dataset.side));
  $("#restart").onclick=start;
  $("#again").onclick=start;
  $("#newpdf").onclick=()=>{ winner.style.display="none"; upload.style.display="flex"; status.textContent=""; };
  $("#share").onclick=share;
  $("#slackcfg").onclick=setHook;

  (function(){
    const wraps=document.querySelectorAll(".imgwrap"); if(wraps.length<2) return;
    let lock=false;
    wraps.forEach((w,i)=>w.addEventListener("scroll",()=>{
      if(lock) return; lock=true;
      wraps[1-i].scrollTop=w.scrollTop;
      requestAnimationFrame(()=>{lock=false;});
    }));
  })();

  const setParam=new URLSearchParams(location.search).get("set");
  loadSet(setParam || "battle-set.json", !setParam);

  window.__battleInject=function(n){ contestants=[]; for(let i=1;i<=n;i++){const c=document.createElement("canvas");c.width=300;c.height=200;const x=c.getContext("2d");x.fillStyle="hsl("+(i*47%360)+",60%,70%)";x.fillRect(0,0,300,200);x.fillStyle="#222";x.font="40px sans-serif";x.fillText("#"+i,120,115);contestants.push({name:"Design "+i,src:c.toDataURL()});} start(); };
})();
</script>
</body>
</html>
